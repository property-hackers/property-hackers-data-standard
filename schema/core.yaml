# PHDS core — value types, enums, provenance.
# NOTE: schema ids/prefixes use example.org placeholders until a real domain
# or w3id.org namespace is registered for PHDS.
id: https://example.org/phds/core
name: phds_core
title: PHDS Core Types
license: MIT
version: 0.2.0

prefixes:
  linkml: https://w3id.org/linkml/
  phds: https://example.org/phds/
default_prefix: phds
default_range: string

imports:
  - linkml:types

types:
  DecimalString:
    typeof: string
    description: >-
      Canonical decimal string — optional leading '-', digits, optional
      fractional part; no exponent notation. Used for money amounts so the
      exact lexical value (including scale) survives every JSON parser
      (avoids IEEE-754 float corruption in JS et al.). Clients map to
      language-native decimals (Python Decimal, Elixir Decimal, Ruby
      BigDecimal, JS string/big.js).
    pattern: "^-?[0-9]+(\\.[0-9]+)?(?![\\s\\S])"

enums:
  AreaUnit:
    permissible_values: {sqft: {}, sqm: {}, acre: {}, hectare: {}}
  LengthUnit:
    permissible_values: {ft: {}, m: {}}
  CaptureMethod:
    permissible_values: {api: {}, scrape: {}, llm_extraction: {}, manual: {}, bulk: {}}
  VerificationStatus:
    permissible_values:
      unverified: {}
      pending_review: {}
      verified: {}
      disputed: {}
      rejected: {}
  PartyType:
    permissible_values: {person: {}, organization: {}}
  SaleTypeEnum:
    permissible_values:
      arms_length: {}
      reo: {description: Real-estate-owned / bank sale}
      short_sale: {}
      auction: {}
      related_party: {}
      portfolio: {}
      partial_interest: {}
      land_contract: {}
      new_construction: {}
      other: {}
  PriceDisclosure:
    description: Reliability of a recorded price
    permissible_values:
      full: {}
      partial: {}
      estimated: {}
      nominal: {}
      non_disclosure: {}
      unknown: {}
  LeaseTypeEnum:
    permissible_values:
      gross: {}
      modified_gross: {}
      triple_net: {}
      double_net: {}
      single_net: {}
      absolute_net: {}
      percentage: {}
      ground: {}
      residential: {}
      other: {}
  RentPeriod:
    permissible_values:
      daily: {}
      monthly: {}
      annual: {}
      per_area_annual: {}
      per_area_monthly: {}
  RateBasis:
    permissible_values:
      per_unit: {}
      per_bed: {}
      per_area: {}
      per_room: {}
      per_key: {}
      per_slip: {}
      per_stall: {}
      per_pad: {}
      other: {}
  RateType:
    permissible_values: {asking: {}, market: {}, effective: {}, contract: {}}
  OfferingType:
    permissible_values: {for_sale: {}, for_lease: {}}
  ListingStatus:
    description: >-
      PHDS-normalized listing status (close mapping to RESO StandardStatus).
      sold/leased replace RESO's ambiguous Closed; Incomplete and Delete are
      MLS record-management states that normalize to other with the raw value
      preserved in extras.
    permissible_values:
      coming_soon: {}
      active: {}
      active_under_contract: {}
      pending: {}
      hold: {}
      sold: {}
      leased: {}
      withdrawn: {}
      canceled: {}
      expired: {}
      other: {}
  ValuationType:
    permissible_values: {avm: {}, appraisal: {}, bpo: {}, broker_opinion: {}, internal: {}}
  LoanEventType:
    permissible_values:
      origination: {}
      assignment: {}
      modification: {}
      satisfaction: {}
      release: {}
      default: {}
      reinstatement: {}
      other: {}
  LienType:
    permissible_values: {tax: {}, judgment: {}, hoa: {}, mechanics: {}, municipal: {}, other: {}}
  ParcelLineageType:
    permissible_values: {split: {}, merge: {}, renumber: {}}
  EstateType:
    permissible_values:
      fee_simple: {}
      leased_fee: {}
      leasehold: {}
      life_estate: {}
      cooperative_shares: {}
      other: {}
  RatingScope:
    permissible_values:
      overall: {}
      exterior: {}
      interior: {}
      component: {}
      other: {}
  StatementBasis:
    description: What an operating statement represents.
    permissible_values:
      actual: {}
      budget: {}
      pro_forma: {}
      stabilized: {}
      projected: {}
      other: {}
  GeocodeAccuracy:
    permissible_values:
      rooftop: {}
      parcel: {}
      street: {}
      postal_centroid: {}
      locality_centroid: {}
      manual: {}
      unknown: {}

slots:
  # Shared money slots. The amount pattern repeats the DecimalString type's
  # pattern at the slot boundary because LinkML's Pydantic generator does not
  # carry custom-type patterns into generated field validators; a single
  # shared slot keeps that workaround in one place.
  # slot_uri disambiguates this scalar decimal-string amount from the
  # Money-valued `amount` attributes on entities (TaxExemption, LoanEvent,
  # Lien, ...): the JSON field name stays `amount`, but the RDF/OWL
  # predicate is phds:decimal_amount so global-slot consumers don't infer
  # DecimalString as the range of every amount.
  amount: {range: DecimalString, required: true, slot_uri: phds:decimal_amount, pattern: "^-?[0-9]+(\\.[0-9]+)?(?![\\s\\S])"}
  currency: {range: string, required: true, pattern: "^[A-Z]{3}(?![\\s\\S])", description: ISO-4217 currency code}

classes:
  Any:
    class_uri: linkml:Any
    description: Open map — the `extras` escape hatch on every entity.

  Money:
    description: Monetary amount. JSON wire format is decimal-as-string. ISO-4217 currency.
    slots: [amount, currency]

  Area:
    description: Area measurement with explicit unit.
    attributes:
      value: {range: decimal, required: true}
      unit: {range: AreaUnit, required: true}

  Length:
    description: Linear measurement with explicit unit.
    attributes:
      value: {range: decimal, required: true}
      unit: {range: LengthUnit, required: true}

  UnitRate:
    description: Money per explicit denominator (price/sqft, rent/sqm/month, spaces/1000 sqft).
    slots: [amount, currency]
    attributes:
      denominator: {range: string, required: true, description: "sqft | sqm | unit | bed | key | month | sqft_month | 1000_sqft | ..."}

  CodeableConcept:
    description: Source coding preserved alongside canonical values (system + code + display).
    attributes:
      system: {}
      code: {}
      display: {}

  Classification:
    is_a: CodeableConcept
    description: >-
      An open-vocabulary classification qualified by the system that defines
      its code. Codes from different systems are not assumed equivalent.
    attributes:
      system: {required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      code: {required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}

  Rating:
    is_a: CodeableConcept
    description: >-
      A rating qualified by the system that defines its code. PHDS does not
      assume codes from different systems are ordinally or semantically equal.
    attributes:
      system: {required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      code: {required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      description: {}
      scope: {range: RatingScope}

  GeoPoint:
    description: WGS84 coordinate.
    attributes:
      latitude: {range: decimal, required: true, minimum_value: -90, maximum_value: 90}
      longitude: {range: decimal, required: true, minimum_value: -180, maximum_value: 180}

  Geometry:
    description: GeoJSON Geometry object (typed-in-standard; optional everywhere).
    attributes:
      type: {required: true, description: "Point | MultiPolygon | ..."}
      coordinates: {range: Any}

  Provenance:
    description: >-
      Record-level source envelope. Pure child rows (parties, areas,
      escalations, filings) inherit the parent envelope unless they carry
      their own.
    attributes:
      provider: {}
      source_url: {range: uri}
      retrieved_at: {range: datetime}
      method: {range: CaptureMethod}
      confidence:
        range: float
        minimum_value: 0
        maximum_value: 1
        description: Fraction from 0 through 1; 0.8 means 80 percent confidence.
      verification: {range: VerificationStatus}
      originating_system: {close_mappings: [reso:OriginatingSystemName], description: System where the record was born}
      source_system: {close_mappings: [reso:SourceSystemName], description: Immediate system that supplied the record}
      source_record_id: {description: The immediate source's record identifier}
      source_created_at: {range: datetime, description: When the immediate source created the record}
      source_modified_at: {range: datetime, description: When the immediate source last modified the record}
