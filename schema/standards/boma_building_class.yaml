id: https://example.org/phds/standards/boma-building-class
name: phds_boma_building_class
title: PHDS BOMA Office Building Class Profiles
license: MIT
version: 0.2.0
see_also:
  - https://boma.org/boma-standards/building-class-definitions
prefixes:
  linkml: https://w3id.org/linkml/
  phds: https://example.org/phds/
default_prefix: phds
default_range: string
imports: [linkml:types, ../capture]

enums:
  BomaMetroSystem:
    permissible_values:
      "urn:phds:standard:boma:office:metro": {}
  BomaInternationalSystem:
    permissible_values:
      "urn:phds:standard:boma:office:international": {}
  BomaMetroCode:
    permissible_values:
      A: {description: Class A}
      B: {description: Class B}
      C: {description: Class C}
  BomaInternationalCode:
    description: Stable PHDS wire codes for BOMA's displayed international labels.
    permissible_values:
      investment: {description: Investment}
      institutional: {description: Institutional}
      speculative: {description: Speculative}

classes:
  BomaMetroOfficeMarketClassification:
    is_a: Rating
    description: >-
      Subjective, market-relative office building classification using BOMA's
      metropolitan-market basis. This is not physical condition or
      construction quality.
    slot_usage:
      system: {range: BomaMetroSystem}
      code: {range: BomaMetroCode}

  BomaInternationalOfficeMarketClassification:
    is_a: Rating
    description: >-
      Subjective, market-relative office building classification using BOMA's
      international basis. This is not physical condition or construction
      quality.
    slot_usage:
      system: {range: BomaInternationalSystem}
      code: {range: BomaInternationalCode}

  BomaMetroCommercialDetails:
    is_a: CommercialDetails
    slot_usage:
      market_classification: {range: BomaMetroOfficeMarketClassification}

  BomaInternationalCommercialDetails:
    is_a: CommercialDetails
    slot_usage:
      market_classification: {range: BomaInternationalOfficeMarketClassification}

  BomaMetroStructure:
    is_a: Structure
    slot_usage:
      commercial: {range: BomaMetroCommercialDetails}

  BomaMetroStructureState:
    is_a: StructureState
    slot_usage:
      commercial: {range: BomaMetroCommercialDetails}

  BomaMetroPropertyStateSnapshot:
    is_a: PropertyStateSnapshot
    slot_usage:
      structure_states: {range: BomaMetroStructureState}

  BomaMetroPropertyProfile:
    is_a: PropertyProfile
    tree_root: true
    description: >-
      Optional BOMA metropolitan-market office classification profile. Core
      PHDS does not depend on this profile.
    slot_usage:
      structures: {range: BomaMetroStructure}
      property_state_snapshots: {range: BomaMetroPropertyStateSnapshot}

  BomaInternationalStructure:
    is_a: Structure
    slot_usage:
      commercial: {range: BomaInternationalCommercialDetails}

  BomaInternationalStructureState:
    is_a: StructureState
    slot_usage:
      commercial: {range: BomaInternationalCommercialDetails}

  BomaInternationalPropertyStateSnapshot:
    is_a: PropertyStateSnapshot
    slot_usage:
      structure_states: {range: BomaInternationalStructureState}

  BomaInternationalPropertyProfile:
    is_a: PropertyProfile
    tree_root: true
    description: >-
      Optional BOMA international-basis office classification profile. Core
      PHDS does not depend on this profile.
    slot_usage:
      structures: {range: BomaInternationalStructure}
      property_state_snapshots: {range: BomaInternationalPropertyStateSnapshot}
