# PHDS entities — the normalized canonical layer.
id: https://example.org/phds/entities
name: phds_entities
title: PHDS Entities
license: MIT
version: 0.2.0

prefixes:
  linkml: https://w3id.org/linkml/
  phds: https://example.org/phds/
  reso: https://ddwiki.reso.org/display/DDW20/
default_prefix: phds
default_range: string

imports:
  - linkml:types
  - core

classes:
  # ==== abstract bases ======================================================
  Entity:
    abstract: true
    attributes:
      id: {identifier: true, range: string, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Canonical identifier; nonblank with no leading or trailing whitespace}
      extras: {range: Any}
      provenance: {range: Provenance}
      verifications: {range: VerificationAttribution, multivalued: true, inlined: true, inlined_as_list: true}

  InstrumentReference:
    description: >-
      Cross-reference to another recorded instrument (e.g., an assignment
      citing the original mortgage's recording number) — the target may not
      exist as a PHDS row.
    attributes:
      relationship_type: {range: CodeableConcept, description: "re_records | corrects | releases | assigns | modifies | subordinates | refers_to"}
      document_number: {}
      registry_reference: {}
      recording_authority: {range: Jurisdiction, inlined: false}
      extras: {range: Any}

  RecordedInstrument:
    mixin: true
    description: >-
      This row corresponds to a document recorded/registered with an
      authority (county recorder, land registry, notarial protocol).
      Narrowly about document identity and recording — legal effect lives on
      the host class.
    attributes:
      document_number: {description: Primary identifier assigned by the recording/registry authority}
      recording_book: {}
      recording_page: {}
      recorded_date: {range: date, description: "Date accepted, recorded, or registered by the authority"}
      instrument_date: {range: date, description: "Date executed/signed as dated on the instrument"}
      document_type: {range: CodeableConcept}
      recording_authority: {range: Jurisdiction, inlined: false, description: "Authority maintaining the record (optional — parcel context is inference, not identity)"}
      registry_reference: {description: "Alternate authority-issued reference: title, dealing, folio, or notarial-act number"}
      related_instruments: {range: InstrumentReference, multivalued: true, inlined: true, inlined_as_list: true}
      artifacts: {range: SourceArtifact, multivalued: true, inlined: false}

  TransactionParty:
    abstract: true
    description: >-
      A contextual role-bearing relationship from an event or record to a
      canonical Party. Exact source wording belongs in provenance or source
      artifacts, not in a second actor-name field. Multi-party is the norm
      (couples on deeds, co-borrowers).
    attributes:
      role: {required: true}
      party: {range: Party, inlined: false, required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      sequence: {range: integer, minimum_value: 1}
      extras: {range: Any}

  # ==== identity ============================================================
  Jurisdiction:
    is_a: Entity
    attributes:
      country: {required: true, pattern: "^[A-Z]{2}(?![\\s\\S])", description: ISO 3166-1 alpha-2 (no default — i18n)}
      region: {}
      name: {required: true}
      kind: {required: true, description: "county | municipality | taxing_district | ... (open vocab)"}
      authority_code: {description: "US: FIPS/GEOID"}
      parent: {range: Jurisdiction, inlined: false}
      boundary: {range: Geometry}

  Address:
    is_a: Entity
    attributes:
      country: {required: true, pattern: "^[A-Z]{2}(?![\\s\\S])"}
      unformatted_address: {description: Fallback when components do not parse}
      street_number: {}
      street_pre_direction: {}
      street_name: {}
      street_suffix: {}
      street_post_direction: {}
      unit_type: {}
      unit_number: {}
      sublocality: {description: neighborhood / borough / barrio}
      city: {}
      region: {}
      postal_code: {}
      postal_code_suffix: {}
      admin_area: {description: county/district name}
      admin_area_code: {description: authority code}
      address_hash: {pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Producer-computed matching key; comparable only under the same scheme}
      address_hash_scheme: {pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Producer-namespaced normalization and hashing scheme}
      location: {range: GeoPoint}
      location_accuracy: {range: GeocodeAccuracy}

  PropertyFacts:
    mixin: true
    attributes:
      name: {}
      property_use_class: {description: PUCS class when property_use_system identifies PUCS}
      property_use_type: {}
      property_use_subtype: {}
      property_use_system: {description: Required when use fields are set; no default}
      estate_type: {range: EstateType}
      location: {range: GeoPoint}
      building_count: {range: integer, description: Producer summary when structures are not enumerated}

  Property:
    is_a: Entity
    mixins: [PropertyFacts]
    description: Stable property identity; mutable descriptive fields come from PropertyFacts.

  Parcel:
    unique_keys:
      parcel_identity:
        unique_key_slots: [jurisdiction, parcel_number, unit_designator, retired_date]
    is_a: Entity
    attributes:
      jurisdiction: {range: Jurisdiction, inlined: false, required: true}
      parcel_number:
        required: true
        description: RAW as issued (RESO UPI rule)
        exact_mappings: [reso:ParcelNumber]
      normalized_parcel_number: {description: "Matching only, never identity"}
      unit_designator: {description: Condo sub-parcel discriminator}
      legal_description: {}
      land_area: {range: Area}
      boundary: {range: Geometry, description: GeoJSON MultiPolygon (optional)}
      retired_date: {range: date, description: Set by lineage events}

  PropertyParcel:
    unique_keys:
      property_parcel_pair:
        unique_key_slots: [property, parcel]
    is_a: Entity
    description: Property ↔ parcel, many-to-many over time (splits/merges/condos). end_date is end-exclusive.
    attributes:
      property: {range: Property, inlined: false, required: true}
      parcel: {range: Parcel, inlined: false, required: true}
      is_primary: {range: boolean}
      start_date: {range: date}
      end_date: {range: date}

  ParcelLineage:
    is_a: Entity
    attributes:
      predecessor_parcel: {range: Parcel, inlined: false, required: true}
      successor_parcel: {range: Parcel, inlined: false, required: true}
      kind: {range: ParcelLineageType, required: true}
      effective_date: {range: date}

  PropertyIdentifier:
    unique_keys:
      identifier_identity:
        unique_key_slots: [scheme, namespace, value]
    is_a: Entity
    description: Namespaced external IDs — MLS keys, vendor IDs, tax account numbers.
    attributes:
      property: {range: Property, inlined: false, required: true}
      scheme: {required: true}
      namespace: {}
      value: {required: true}

  ParcelIdentifier:
    unique_keys:
      parcel_identifier_identity:
        unique_key_slots: [scheme, namespace, value]
    is_a: Entity
    description: >-
      Namespaced external parcel IDs — assessor account numbers, alternate
      APNs, Universal Parcel Identifier (UPI) URNs (scheme upi, value the
      full urn verbatim including any :sub: subcomponent). Mirrors
      PropertyIdentifier for identifiers scoped to a parcel rather than the
      property.
    attributes:
      parcel: {range: Parcel, inlined: false, required: true}
      scheme: {required: true}
      namespace: {}
      value: {required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}

  # ==== parties =============================================================
  Party:
    is_a: Entity
    description: One canonical model for every actor — owners, buyers, tenants and lessees, borrowers, lenders, brokers, trustees, claimants, contractors, associations, and valuation performers.
    attributes:
      kind: {range: PartyType, required: true}
      legal_form:
        range: Classification
        description: >-
          Optional system-qualified legal form for an organization under an
          identified jurisdictional or producer vocabulary. This is not an
          industry classification or a contextual role such as lender,
          broker, tenant, or association.
      name: {required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Canonical display name for this Party in the profile; nonblank with no leading or trailing whitespace. Source-specific wording is attributed through provenance or SourceArtifact.}
      normalized_name: {description: Producer-derived matching key for the canonical display name. Its normalization algorithm is producer-defined; it is not authoritative display text or a separate identity.}
      name_first: {description: Optional producer-derived parsed component of a person's canonical display name; not an independent identity and not universally applicable across naming systems.}
      name_middle: {description: Optional producer-derived parsed component of a person's canonical display name; not an independent identity and not universally applicable across naming systems.}
      name_last: {description: Optional producer-derived parsed component of a person's canonical display name; not an independent identity and not universally applicable across naming systems.}
      classifications: {range: Classification, multivalued: true, inlined: true, inlined_as_list: true, description: "System-qualified actor classifications from an open vocabulary; use producer-namespaced system and code values"}
      addresses: {range: PartyAddress, multivalued: true, inlined: true, inlined_as_list: true}
      contacts: {range: PartyContact, multivalued: true, inlined: true, inlined_as_list: true}

  VerificationAttribution:
    description: Verification performed by one canonical party.
    attributes:
      verifier: {range: Party, inlined: false, required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      verified_at: {range: datetime, required: true}
      note: {}
      extras: {range: Any}

  SourceArtifact:
    is_a: Entity
    description: >-
      Source material that supports or preserves an assertion. Semantic
      validation requires at least one nonblank uri or storage_reference.
    attributes:
      uri: {range: uri, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", close_mappings: [reso:MediaURL]}
      storage_reference: {pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Producer-defined object or document storage reference}
      media_type: {description: MIME media type, close_mappings: [reso:MimeType]}
      kind: {range: CodeableConcept}
      title: {}
      original_filename: {}
      content_hash: {pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      hash_scheme: {pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Producer-namespaced content hashing scheme}
      page_count: {range: integer, minimum_value: 1}
      captured_at: {range: datetime}
      order: {range: integer, minimum_value: 0, close_mappings: [reso:Order], description: Presentation order within the owning record's artifact list}
      short_description: {close_mappings: [reso:ShortDescription]}
      source_modified_at: {range: datetime, close_mappings: [reso:ModificationTimestamp], description: When the source system last modified this media/document record}

  AddressAssociation:
    mixin: true
    attributes:
      address: {range: Address, inlined: false, required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      role: {range: CodeableConcept, description: "situs | entrance | alias | address_range | former | mailing | other (open vocabulary)"}
      is_primary: {range: boolean}
      valid_from: {range: date}
      valid_to: {range: date}

  PartyAddress:
    mixins: [AddressAssociation]
    attributes:
      extras: {range: Any}
      provenance: {range: Provenance}

  PropertyAddress:
    is_a: Entity
    mixins: [AddressAssociation]
    attributes:
      property: {range: Property, inlined: false, required: true}

  PartyContact:
    attributes:
      kind: {required: true, description: phone | email | website | other}
      value: {required: true}
      label: {}
      is_primary: {range: boolean}
      do_not_contact: {range: boolean}
      extras: {range: Any}
      provenance: {range: Provenance}

  OwnershipPeriod:
    is_a: Entity
    description: One ownership regime; end_date is end-exclusive, NULL = current.
    attributes:
      property: {range: Property, inlined: false, required: true}
      start_date: {range: date}
      end_date: {range: date}
      vesting_type: {description: joint_tenants | tenants_in_common | community_property | ... (open)}
      mailing_address: {range: Address, inlined: false, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Owner's mailing address during THIS period}
      acquired_via_transfer: {range: Transfer, inlined: false}
      disposed_via_transfer: {range: Transfer, inlined: false}
      interests: {range: OwnershipInterest, multivalued: true, inlined: true, inlined_as_list: true}

  OwnershipInterest:
    attributes:
      party: {range: Party, inlined: false, required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      interest_pct: {range: decimal, minimum_value: 0, maximum_value: 100, description: 0–100 percentage points; 75 means 75 percent.}
      role: {description: owner | trustee | gp | lp}
      is_owner_occupied: {range: boolean}
      extras: {range: Any}

  # ==== physical ============================================================
  StructureFacts:
    mixin: true
    attributes:
      kind: {description: building | barn | silo | shed | outbuilding | ... (open)}
      name: {}
      structure_number: {}
      living_area:
        range: Area
        description: >-
          Finished area intended for human habitation. The measurement method
          and treatment of above-grade and below-grade space come from the
          applicable profile or provenance.
        exact_mappings: [reso:LivingArea]
      gross_area: {range: Area}
      rentable_area:
        range: Area
        description: >-
          Area of occupiable premises allocated to a tenant or available for
          lease under the stated measurement method.
      ground_floor_area: {range: Area}
      basement_area: {range: Area}
      basement_finished_area: {range: Area}
      garage_area: {range: Area}
      areas:
        range: AreaMeasure
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Long-tail area kinds; canonical kinds forbidden here (validator-enforced)
      year_built: {range: integer, minimum_value: 1, maximum_value: 2200, exact_mappings: [reso:YearBuilt]}
      year_built_estimated: {range: boolean}
      effective_year_built: {range: integer}
      stories: {range: decimal}
      unit_count: {range: integer, minimum_value: 1}
      construction_method: {description: site_built | manufactured | modular | container | 3d_printed | ...}
      construction_status: {description: complete | proposed | under_construction}
      construction_type: {}
      exterior_wall_type: {}
      roof_material_type: {}
      roof_style_type: {}
      foundation_type: {}
      foundation_material: {}
      condition_ratings:
        range: Rating
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: >-
          Physical-condition ratings. Semantic validation permits at most one
          rating for each system and scope pair.
      quality_ratings:
        range: Rating
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: >-
          Construction-quality ratings. Semantic validation permits at most
          one rating for each system and scope pair.
      heating_types: {multivalued: true}
      heating_fuel_type: {}
      cooling_types: {multivalued: true}
      sewer_type: {}
      water_type: {}
      features: {multivalued: true, description: Open vocabulary for physical features and amenities}
      residential: {range: ResidentialDetails, inlined: true}
      commercial: {range: CommercialDetails, inlined: true}
      renovations: {range: Renovation, multivalued: true, inlined: true, inlined_as_list: true}

  Structure:
    is_a: Entity
    mixins: [StructureFacts]
    attributes:
      property: {range: Property, inlined: false, required: true}

  AreaMeasure:
    attributes:
      kind: {required: true}
      area: {range: Area, required: true}
      extras: {range: Any}

  ResidentialDetails:
    description: >-
      Internationally neutral residential facts. When nested in Structure,
      these fields describe observation-derived current state. When nested in
      StructureState, they are asserted historical facts governed by
      PropertyStateSnapshot.as_of_date. provenance.retrieved_at is retrieval
      metadata, not the effective date. Events reference a separately bundled
      PropertyStateSnapshot rather than containing the snapshot. Optional
      standards profiles may constrain values for a specific use case.
    attributes:
      bedrooms_total: {range: integer, minimum_value: 0, exact_mappings: [reso:BedroomsTotal]}
      bathrooms_full: {range: integer}
      bathrooms_half: {range: integer}
      bathrooms_three_quarter: {range: integer}
      rooms_total: {range: integer}
      attachment: {description: detached | attached | semi_detached | rowhouse_townhouse | ...}
      architectural_design: {description: ranch | cape_cod | colonial | craftsman | ...}
      basement_type: {description: none | full | partial | walkout | cellar}
      garage_type: {description: garage | carport | parking_garage | driveway | none | ...}
      garage_attachment: {description: attached | detached | built_in}
      parking_spaces: {range: integer}
      fireplaces: {range: integer}
      has_pool: {range: boolean}
      has_attic: {range: boolean}
      has_adu: {range: boolean}
      adu_legally_rentable: {range: boolean}
      occupancy: {description: owner_occupied | tenant | vacant}
      renewable_energy_components: {multivalued: true, description: solar | geothermal | wind}
      extras: {range: Any}
      provenance: {range: Provenance}

  CommercialDetails:
    description: >-
      Internationally neutral commercial facts. When nested in Structure,
      these fields describe observation-derived current state. When nested in
      StructureState, they are asserted historical facts governed by
      PropertyStateSnapshot.as_of_date. provenance.retrieved_at is retrieval
      metadata, not the effective date. Historical/per-period financial
      figures belong on dated records such as OperatingStatement and
      UnitRentObservation. Events reference a separately bundled
      PropertyStateSnapshot rather than containing the snapshot. Optional
      standards profiles may constrain values for a specific use case.
    attributes:
      market_classification:
        range: Rating
        description: >-
          Competitive market positioning under the named rating system;
          distinct from physical condition and construction quality.
      clear_height: {range: Length}
      dock_doors: {range: integer}
      drive_in_doors: {range: integer}
      occupancy_pct: {range: decimal, minimum_value: 0, maximum_value: 100, description: 0–100 percentage points; 95 means 95 percent.}
      parking_spaces: {range: integer}
      parking_ratio: {range: UnitRate, description: e.g. spaces per 1000 sqft — denominator explicit}
      tenancy: {description: single_tenant | multi_tenant}
      tenant_count: {range: integer, description: "Distinct legal tenants (not suites or leases); timing follows the containing Structure or StructureState context"}
      parking_types: {multivalued: true, description: surface | structured | underground | covered | ...}
      has_sprinkler: {range: boolean}
      elevators: {range: integer}
      submarket: {description: CRE market geography}
      extras: {range: Any}
      provenance: {range: Provenance}

  Renovation:
    description: Repeatable events — never a flat year on the structure.
    attributes:
      kind: {description: kitchen | bath | roof | addition | gut | ... (open)}
      description: {}
      completed_year: {range: integer, minimum_value: 1, maximum_value: 2200}
      completed_date: {range: date}
      cost: {range: Money}
      extras: {range: Any}
      provenance: {range: Provenance}

  SiteFacts:
    mixin: true
    attributes:
      lot_size: {range: Area}
      usable_land_area: {range: Area}
      usable_land_area_basis: {}
      land_use: {range: CodeableConcept}
      land_use_category: {}
      zoning_code: {}
      flood_zone: {}
      hazard_zones: {multivalued: true}
      view_types: {multivalued: true}
      site_influences: {multivalued: true}
      easements: {multivalued: true}
      restrictions: {multivalued: true}
      utilities: {multivalued: true}
      frontage: {range: Length}
      depth: {range: Length}
      topography: {}
      is_corner: {range: boolean}
      entitlement_status: {}
      buildable_units: {range: integer}
      subdivision: {}
      lot_number: {}
      block: {}
      tract_number: {}
      phase_number: {}
      section_township_range: {}

  Site:
    is_a: Entity
    mixins: [SiteFacts]
    attributes:
      property: {range: Property, inlined: false, required: true}

  SpaceFacts:
    mixin: true
    attributes:
      floor_number: {range: integer}
      space_use: {}
      rentable_area: {range: Area}
      usable_area: {range: Area}
      bedrooms: {range: integer}
      bathrooms: {range: decimal}
      occupancy: {description: owner_occupied | tenant | vacant}
      is_adu: {range: boolean}
      is_active: {range: boolean}

  Space:
    unique_keys:
      space_identity:
        unique_key_slots: [property, space_identifier]
    is_a: Entity
    mixins: [SpaceFacts]
    description: Leasable suites/units (CRE, multifamily).
    attributes:
      property: {range: Property, inlined: false, required: true}
      structure: {range: Structure, inlined: false}
      space_identifier: {required: true}

  PropertyState:
    is_a: Entity
    mixins: [PropertyFacts]
    attributes:
      subject: {range: Property, inlined: false, required: true}

  SiteState:
    is_a: Entity
    mixins: [SiteFacts]
    attributes:
      subject: {range: Site, inlined: false, required: true}

  StructureState:
    is_a: Entity
    mixins: [StructureFacts]
    attributes:
      subject: {range: Structure, inlined: false, required: true}

  SpaceState:
    is_a: Entity
    mixins: [SpaceFacts]
    attributes:
      subject: {range: Space, inlined: false, required: true}

  PropertyStateSnapshot:
    is_a: Entity
    description: Sparse asserted physical state effective on as_of_date.
    attributes:
      property: {range: Property, inlined: false, required: true}
      as_of_date: {range: date, required: true}
      basis: {range: CodeableConcept, description: "at_sale | at_listing | at_lease | inspection | reported | inferred (open vocabulary)"}
      property_state: {range: PropertyState, inlined: true}
      site_states: {range: SiteState, multivalued: true, inlined: true, inlined_as_list: true}
      structure_states: {range: StructureState, multivalued: true, inlined: true, inlined_as_list: true}
      space_states: {range: SpaceState, multivalued: true, inlined: true, inlined_as_list: true}

  PropertyAssociation:
    is_a: Entity
    description: HOA or property-association relationship; identity and classification live on the canonical Party.
    attributes:
      property: {range: Property, inlined: false, required: true}
      party: {range: Party, inlined: false, required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: The canonical association organization}
      fee: {range: Money}
      fee_period: {range: RentPeriod}

  # ==== records & events ====================================================
  Assessment:
    unique_keys:
      assessment_identity:
        unique_key_slots: [parcel, jurisdiction, tax_year, roll_type]
    is_a: Entity
    description: Parcel-first tax-roll values; identity = parcel + assessing jurisdiction + year + roll type.
    attributes:
      parcel: {range: Parcel, inlined: false, required: true}
      jurisdiction: {range: Jurisdiction, inlined: false, required: true, description: The ASSESSING authority}
      tax_year: {range: integer, required: true, minimum_value: 1000, maximum_value: 2200}
      roll_type: {description: original | corrected | supplemental | appeal | ...}
      assessed_land_value: {range: Money}
      assessed_improvement_value: {range: Money}
      assessed_total_value: {range: Money}
      market_land_value: {range: Money}
      market_improvement_value: {range: Money}
      market_total_value: {range: Money}
      appraised_land_value: {range: Money}
      appraised_improvement_value: {range: Money}
      appraised_total_value: {range: Money}
      exemptions: {range: TaxExemption, multivalued: true, inlined: true, inlined_as_list: true}

  TaxExemption:
    attributes:
      kind: {required: true, description: homestead | senior | veteran | ... (open)}
      amount: {range: Money}
      extras: {range: Any}

  TaxBill:
    unique_keys:
      tax_bill_identity:
        unique_key_slots: [parcel, jurisdiction, tax_year, bill_number]
    is_a: Entity
    attributes:
      parcel: {range: Parcel, inlined: false, required: true}
      jurisdiction: {range: Jurisdiction, inlined: false, required: true, description: Issuing authority}
      tax_year: {range: integer, required: true}
      bill_number: {}
      amount_billed: {range: Money}
      amount_paid: {range: Money}
      is_delinquent: {range: boolean}
      delinquent_year: {range: integer}
      delinquent_amount: {range: Money}
      rate_code_area: {}
      installments: {range: TaxInstallment, multivalued: true, inlined: true, inlined_as_list: true}
      line_items: {range: TaxLineItem, multivalued: true, inlined: true, inlined_as_list: true}

  TaxInstallment:
    attributes:
      installment_number: {range: integer}
      due_date: {range: date}
      amount: {range: Money}
      paid_date: {range: date}
      amount_paid: {range: Money}
      is_delinquent: {range: boolean}
      extras: {range: Any}

  TaxLineItem:
    attributes:
      jurisdiction: {range: Jurisdiction, inlined: false, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Optional canonical taxing jurisdiction responsible for this line item}
      rate: {range: decimal, description: Source-defined tax rate or levy value; not governed by the _pct percentage-points convention.}
      amount: {range: Money}
      extras: {range: Any}

  Transfer:
    is_a: Entity
    mixins: [RecordedInstrument]
    description: Every recorded deed/instrument — the ownership ledger, NOT comps.
    attributes:
      property: {range: Property, inlined: false, required: true}
      parcel: {range: Parcel, inlined: false}
      transfer_type: {required: true, description: warranty_deed | quitclaim | foreclosure | tax_deed | ... (open)}
      effective_date: {range: date, description: Legal/economic effectiveness — may differ from instrument_date and recorded_date}
      consideration: {range: Money, description: Often $0 / nominal}
      transfer_tax: {range: Money, description: Doc stamps; price-inference basis in many places}
      price_disclosure: {range: PriceDisclosure}
      price_code: {range: CodeableConcept}
      interest_conveyed:
        range: CodeableConcept
        description: The legal or beneficial interest conveyed by this transfer.
      partial_interest_pct: {range: decimal, minimum_value: 0, maximum_value: 100, description: 0–100 percentage points; 25 means 25 percent.}
      is_inter_family: {range: boolean}
      is_distressed: {range: boolean}
      parties: {range: TransferParty, multivalued: true, inlined: true, inlined_as_list: true}

  TransferParty:
    is_a: TransactionParty
    description: role = grantor | grantee

  SaleEvent:
    is_a: Entity
    description: A market sale referencing its recorded transfer. A quitclaim never becomes a comp.
    attributes:
      property: {range: Property, inlined: false, required: true}
      property_state: {range: PropertyStateSnapshot, inlined: false}
      transfer: {range: Transfer, inlined: false}
      close_date: {range: date, required: true, close_mappings: [reso:CloseDate], description: Closing date of the market sale (reconciled layer)}
      sale_price:
        range: Money
        description: Reconciled market-sale amount — NOT the raw MLS ClosePrice claim (that is SaleEvidence.close_price)
        related_mappings: [reso:ClosePrice]
        annotations: {value_classification: reconciled}
      price_disclosure: {range: PriceDisclosure}
      price_code: {range: CodeableConcept}
      sale_type: {range: SaleTypeEnum}
      price_per_area: {range: UnitRate, annotations: {value_classification: derived}}
      price_per_unit: {range: Money, annotations: {value_classification: derived}}
      buyer_financing: {range: CodeableConcept, close_mappings: [reso:BuyerFinancing], description: Financing the purchaser used to close}
      concessions_amount: {range: Money, close_mappings: [reso:ConcessionsAmount]}
      concessions: {range: CodeableConcept, multivalued: true, inlined: true, inlined_as_list: true, close_mappings: [reso:Concessions]}
      concessions_comments: {close_mappings: [reso:ConcessionsComments]}
      cap_rate: {range: decimal, minimum_value: 0, maximum_value: 100, description: Capitalization rate in percentage points; 5.75 means 5.75 percent., annotations: {value_classification: derived}}
      noi_at_sale: {range: Money}
      opex_at_sale: {range: Money}
      occupancy_at_sale_pct: {range: decimal, minimum_value: 0, maximum_value: 100, description: 0–100 percentage points; 90 means 90 percent.}
      unit_count_at_sale: {range: integer, minimum_value: 1}
      supporting_operating_statement: {range: OperatingStatement, inlined: false, description: "Traceability: the statement noi_at_sale derives from, when known"}
      parties: {range: SaleEventParty, multivalued: true, inlined: true, inlined_as_list: true}
      remarks: {description: Source- or vendor-authored narrative interpreted through provenance.}
      listings: {range: SaleListingRelationship, multivalued: true, inlined: true, inlined_as_list: true, description: Absent/empty for off-market sales}

  SaleEventParty:
    is_a: TransactionParty
    description: role = buyer | seller | buyer_broker | seller_broker

  SaleListingRelationship:
    description: >-
      Sale-to-listing relation. Vocabulary stays sale-oriented; relist chains
      are listing-to-listing facts and "this MLS reported the sale" is a
      SaleEvidence row with listing set — neither belongs here.
    attributes:
      listing: {range: Listing, inlined: false, required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      relationship_type: {required: true, description: "resulted_in_sale | prior_listing | other (open)"}
      extras: {range: Any}

  SaleEvidence:
    is_a: Entity
    description: >-
      One source's claims about a market sale. SaleEvent holds the
      reconciliation; evidence rows hold the disagreeing inputs (MLS close
      record, deed, assessor, broker or appraiser verification). One row =
      one source = one provenance. When an MLS-sourced row links a listing,
      its close_date/close_price should equal that listing's closed-event
      values (convention, deliberately unenforced).
    attributes:
      sale: {range: SaleEvent, inlined: false, required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      listing: {range: Listing, inlined: false}
      transfer: {range: Transfer, inlined: false}
      close_date: {range: date, exact_mappings: [reso:CloseDate], annotations: {value_classification: asserted}}
      close_price: {range: Money, close_mappings: [reso:ClosePrice], annotations: {value_classification: asserted}}
      concessions_amount: {range: Money, close_mappings: [reso:ConcessionsAmount], annotations: {value_classification: asserted}}
      document_number: {}
      verification_method: {range: CodeableConcept, description: "mls_record | deed | assessor | broker_confirmed | appraiser_verified | ... (open)"}
      remarks: {}
      artifacts: {range: SourceArtifact, multivalued: true, inlined: false}
      provenance: {range: Provenance, required: true}

  ListingIdentifier:
    description: >-
      Namespaced listing identifier mirroring PropertyIdentifier
      (scheme + namespace + value). RESO ListingKey and ListingId stay
      separately recoverable as distinct schemes; identity rule is
      (namespace, scheme=listing_key, value) with provider-specific
      fallback. At most one is_primary identifier per namespace.
    attributes:
      scheme: {required: true, description: "listing_key | listing_id | source_system_id | other (open)"}
      namespace: {description: "Issuing system: MLS, aggregator, or portal"}
      value: {required: true, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      is_primary: {range: boolean}
      extras: {range: Any}

  Listing:
    is_a: Entity
    description: >-
      Listing identity, header identifiers, and latest-observed agreement
      terms; process events by effective_date ascending; array order breaks
      same-date ties. Carry status, list_price, and rent_period forward
      independently from the latest event that supplies each field. Original
      asking terms come from the earliest event supplying them. close_price
      comes from the latest closed event supplying it.
    attributes:
      property: {range: Property, inlined: false, required: true}
      property_state: {range: PropertyStateSnapshot, inlined: false}
      offering_type: {range: OfferingType, required: true}
      identifiers: {range: ListingIdentifier, multivalued: true, inlined: true, inlined_as_list: true}
      listing_contract_date: {range: date, exact_mappings: [reso:ListingContractDate]}
      expiration_date: {range: date, exact_mappings: [reso:ExpirationDate]}
      listing_agreement_type: {description: "exclusive_right_to_sell | exclusive_agency | open | net | other (open)", close_mappings: [reso:ListingAgreement]}
      service_level: {description: "full_service | limited_service | entry_only | other (open)", close_mappings: [reso:ListingService]}
      marketing_channel: {description: "mls | private_network | public_portal | owner_direct | auction_platform | other (open)"}
      exposure_type: {description: "public | office_exclusive | private | coming_soon | other (open)"}
      special_listing_conditions: {range: CodeableConcept, multivalued: true, inlined: true, inlined_as_list: true, close_mappings: [reso:SpecialListingConditions]}
      events: {range: ListingEvent, multivalued: true, inlined: true, inlined_as_list: true, list_elements_ordered: true}
      participants: {range: ListingParticipant, multivalued: true, inlined: true, inlined_as_list: true}
      artifacts: {range: SourceArtifact, multivalued: true, inlined: false}
      remarks: {description: Source- or vendor-authored narrative interpreted through provenance.}

  ListingEvent:
    description: >-
      A dated listing assertion. effective_date is when the change took
      effect; effective_at adds optional precision and must fall on
      effective_date (compared on the timestamp's lexical date in its stated
      offset). observed_at is when the producer retrieved or detected the
      event. Order events by effective_date ascending, then effective_at when
      present, then array order. list_price is the asking sale price or
      periodic rent; rent_period states the period when it is rent.
      close_price is asserted only on a closed event and is the source's
      reported closing claim, not the reconciled SaleEvent.sale_price.
    attributes:
      effective_date: {range: date, required: true}
      effective_at: {range: datetime}
      observed_at: {range: datetime}
      event_type: {required: true, description: "listed | price_change | status_change | coming_soon | back_on_market | relisted | contingent | pending | closed | expired | withdrawn | canceled (open)"}
      status: {range: ListingStatus, close_mappings: [reso:StandardStatus]}
      source_status: {exact_mappings: [reso:MlsStatus], description: Native source status verbatim}
      list_price: {range: Money, close_mappings: [reso:ListPrice]}
      list_price_low: {range: Money, close_mappings: [reso:ListPriceLow], description: Lower bound for range-priced listings}
      rent_period: {range: RentPeriod}
      close_price: {range: Money, close_mappings: [reso:ClosePrice]}
      extras: {range: Any}
      provenance: {range: Provenance}

  ListingParticipant:
    is_a: TransactionParty
    description: role = listing_agent | co_listing_agent | buyer_agent | listing_brokerage | selling_brokerage

  LeaseEvent:
    is_a: Entity
    description: Executed leases (not asking rents — see UnitRentObservation).
    attributes:
      property: {range: Property, inlined: false, required: true}
      property_state: {range: PropertyStateSnapshot, inlined: false}
      space: {range: Space, inlined: false}
      lease_type: {range: LeaseTypeEnum}
      execution_date: {range: date}
      commencement_date: {range: date}
      expiration_date: {range: date}
      term_months: {range: integer, minimum_value: 1}
      leased_area: {range: Area}
      rent: {range: Money}
      rent_period: {range: RentPeriod}
      starting_rent_per_area: {range: UnitRate}
      effective_rent_per_area: {range: UnitRate}
      net_effective_rent_per_area: {range: UnitRate}
      free_rent_months: {range: decimal}
      ti_allowance_per_area: {range: UnitRate}
      expense_structure: {range: ExpenseStructure, inlined: true}
      parties: {range: LeaseEventParty, multivalued: true, inlined: true, inlined_as_list: true}
      escalations: {range: LeaseEscalation, multivalued: true, inlined: true, inlined_as_list: true}
      concessions: {range: LeaseConcession, multivalued: true, inlined: true, inlined_as_list: true}
      remarks: {description: Source- or vendor-authored narrative interpreted through provenance.}

  LeaseEventParty:
    is_a: TransactionParty
    description: role = lessee | landlord | guarantor | lessee_broker | landlord_broker

  ExpenseStructure:
    description: Who pays what (taxes/insurance/CAM/utilities).
    attributes:
      taxes_paid_by: {description: landlord | tenant | shared}
      insurance_paid_by: {}
      cam_paid_by: {}
      utilities_paid_by: {}
      notes: {}
      extras: {range: Any}

  LeaseEscalation:
    attributes:
      escalation_type: {required: true, description: fixed_amount | fixed_percent | cpi | step_schedule | fmv | none}
      escalation_value:
        range: decimal
        description: >-
          For escalation_type=fixed_percent, a value from 0-100 percentage
          points; 3 means 3 percent. For escalation_type=fixed_amount, the
          increment in the currency of the parent LeaseEvent.rent and the
          period specified by LeaseEvent.rent_period.
      frequency_months: {range: integer}
      cpi_index: {}
      cpi_floor: {range: decimal, description: CPI escalation floor in percentage points; 2 means 2 percent.}
      cpi_cap: {range: decimal, description: CPI escalation cap in percentage points; 5 means 5 percent.}
      steps: {range: RentStep, multivalued: true, inlined: true, inlined_as_list: true}
      effective_from: {range: date}
      effective_until: {range: date}
      extras: {range: Any}

  RentStep:
    attributes:
      from_date: {range: date, required: true}
      amount: {range: Money, required: true}

  LeaseConcession:
    attributes:
      concession_type: {required: true, description: free_rent | ti_allowance | moving_allowance | ...}
      concession_value: {range: Money}
      abatement_months: {range: decimal}
      abatement_percent: {range: decimal, minimum_value: 0, maximum_value: 100, description: 0–100 percentage points; 10 means 10 percent.}
      ti_cap_total: {range: Money}
      conditions: {range: Any}
      notes: {}
      extras: {range: Any}

  UnitRentObservation:
    is_a: Entity
    description: Advertised/going rates — floorplans, storage units, slips. NOT executed leases.
    attributes:
      property: {range: Property, inlined: false, required: true}
      unit_type: {required: true, description: "'1BR/1BA', '10x10'"}
      unit_area: {range: Area}
      bedrooms: {range: integer}
      bathrooms: {range: decimal}
      unit_count: {range: integer, description: Units of this type}
      units_available: {range: integer}
      rate: {range: Money, required: true}
      rate_period: {range: RentPeriod}
      rate_basis: {range: RateBasis}
      rate_type: {range: RateType}
      observed_date: {range: date, required: true}
      concessions_note: {}

  Loan:
    is_a: Entity
    mixins: [RecordedInstrument]
    description: >-
      Recorded debt. Originating lender identity and classification live on
      the canonical Party referenced by a LoanParty. Assignments,
      modifications, satisfactions, and other lifecycle assertions are dated
      events; consumers derive current status and satisfaction dates.
    attributes:
      property: {range: Property, inlined: false, required: true}
      parcel: {range: Parcel, inlined: false}
      transfer: {range: Transfer, inlined: false, description: Purchase-money linkage}
      is_purchase_money: {range: boolean}
      loan_amount: {range: Money}
      loan_type: {description: conventional | fha | va | ... (open)}
      purpose: {description: purchase | refinance | construction | heloc | ...}
      is_heloc: {range: boolean}
      is_construction: {range: boolean}
      is_seller_carryback: {range: boolean}
      is_assumable: {range: boolean}
      interest_rate: {range: decimal, minimum_value: 0, description: Nominal interest rate in percentage points; 6.5 means 6.5 percent.}
      is_variable_rate: {range: boolean}
      term_months: {range: integer, minimum_value: 1}
      due_date: {range: date}
      lien_position: {range: integer, minimum_value: 1}
      parties: {range: LoanParty, multivalued: true, inlined: true, inlined_as_list: true}
      events: {range: LoanEvent, multivalued: true, inlined: true, inlined_as_list: true}

  LoanParty:
    is_a: TransactionParty
    description: role = borrower | lender | beneficiary | trustee (assignees live in loan events)

  LoanEvent:
    mixins: [RecordedInstrument]
    description: >-
      Dated loan lifecycle — assignments, modifications, satisfactions.
      Recording fields apply when the event is a recorded instrument; they
      stay null for unrecorded servicing events.
    attributes:
      event_type: {range: LoanEventType, required: true}
      effective_date: {range: date}
      amount: {range: Money}
      to_party: {range: Party, inlined: false, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Canonical assignee for assignment-like events}
      extras: {range: Any}
      provenance: {range: Provenance}

  Lien:
    is_a: Entity
    mixins: [RecordedInstrument]
    description: Involuntary encumbrances — tax, judgment, HOA, mechanic's.
    attributes:
      property: {range: Property, inlined: false, required: true}
      kind: {range: LienType, required: true}
      amount: {range: Money}
      released_date: {range: date}
      parties: {range: LienParty, multivalued: true, inlined: true, inlined_as_list: true}

  LienParty:
    is_a: TransactionParty
    description: role = claimant | debtor

  ForeclosureCase:
    is_a: Entity
    description: A foreclosure PROCEEDING; its recorded filings append over time.
    attributes:
      property: {range: Property, inlined: false, required: true}
      loan: {range: Loan, inlined: false, description: "The defaulted loan, when known"}
      case_number: {}
      opened_date: {range: date}
      resolved_date: {range: date}
      resolution: {description: sold_at_auction | cured | dismissed | reo}
      past_due_amount: {range: Money}
      unpaid_balance: {range: Money}
      original_loan_amount: {range: Money}
      auction_min_bid: {range: Money}
      auction_location: {}
      filings: {range: ForeclosureFiling, multivalued: true, inlined: true, inlined_as_list: true}
      parties: {range: ForeclosureCaseParty, multivalued: true, inlined: true, inlined_as_list: true}

  ForeclosureFiling:
    mixins: [RecordedInstrument]
    description: One recorded filing; postponements append as new filings.
    attributes:
      status: {required: true, description: nod | lis_pendens | notice_of_sale | auction_scheduled | postponement | ... (open; US-seeded)}
      auction_date: {range: date}
      auction_at_time: {description: Time-of-day as published}
      extras: {range: Any}
      provenance: {range: Provenance}

  ForeclosureCaseParty:
    is_a: TransactionParty
    description: >-
      Open contextual role. Mortgage and deed-of-trust proceedings commonly
      use lender | trustee | borrower; lien foreclosures may instead use
      claimant | debtor.

  Permit:
    is_a: Entity
    description: Building permits — header + lifecycle dates. Inspections/projects are extension.
    attributes:
      property: {range: Property, inlined: false, required: true}
      structure: {range: Structure, inlined: false}
      permitting_jurisdiction: {range: Jurisdiction, inlined: false}
      permit_number: {}
      kind: {description: roofing | solar | hvac | adu | pool | new_construction | ... (open)}
      status: {description: issued | finaled | expired | ... (open)}
      description: {}
      applied_date: {range: date}
      issued_date: {range: date}
      finaled_date: {range: date}
      expiration_date: {range: date}
      job_value: {range: Money}
      fees: {range: Money}
      contractor_party: {range: Party, inlined: false, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Canonical contractor Party reference; credential records are outside core v0.2}
      artifacts: {range: SourceArtifact, multivalued: true, inlined: false}

  OperatingStatement:
    is_a: Entity
    description: >-
      Operating performance of a property for one period: income, vacancy,
      expenses, NOI. The stated totals are authoritative; line_items provide
      detail and are not required to sum to the totals. Canonical relations:
      egi = pgi - vacancy_loss (+ reimbursements where recovered);
      noi = egi - opex_total. capex and reserves sit below the NOI line
      unless the corresponding *_included_in_opex flag is true; same for
      ground_lease_expense. All Money fields on one statement, including
      line items, MUST share a single currency (validator-enforced, not
      expressible in LinkML). Growth-rate and other model assumptions are
      out of scope (valuation extension).
    attributes:
      property: {range: Property, inlined: false, required: true}
      statement_year:
        range: integer
        required: true
        minimum_value: 1000
        maximum_value: 2200
        description: >-
          The calendar year the statement is for (the year containing
          period_end for fiscal/trailing periods).
      period_start:
        range: date
        description: >-
          For fiscal-year, trailing-12, or partial periods. period_start and
          period_end must be provided together; omit both for calendar-year
          statements.
      period_end: {range: date}
      statement_basis: {range: StatementBasis}
      pgi: {range: Money, description: Potential gross income}
      vacancy_loss: {range: Money}
      vacancy_pct: {range: decimal, minimum_value: 0, maximum_value: 100, description: 0–100 percentage points; 5 means 5 percent.}
      egi: {range: Money, description: Effective gross income}
      opex_total: {range: Money}
      noi: {range: Money, description: Net operating income; may be negative}
      capex: {range: Money}
      reimbursements: {range: Money, description: Expense recoveries from tenants (CRE)}
      reserves: {range: Money, description: Reserves for replacement}
      reserves_included_in_opex: {range: boolean}
      ground_lease_expense: {range: Money}
      ground_lease_included_in_opex: {range: boolean}
      line_items: {range: StatementLineItem, multivalued: true, inlined: true, inlined_as_list: true}

  StatementLineItem:
    attributes:
      category: {required: true, description: income | expense | capital | other (open vocab)}
      label: {required: true}
      amount: {range: Money, required: true}
      extras: {range: Any}

  RentRoll:
    is_a: Entity
    description: >-
      Dated rent and occupancy observation applicable to any property use.
      Header totals are authoritative reported values; lines are supporting
      detail and are not required to sum to the totals. All Money values on
      one rent roll MUST use one currency (validator-enforced). For its
      as_of_date, this record governs reported occupancy and rent facts;
      current-state fields such as Space.occupancy and
      CommercialDetails.occupancy_pct do not override it. A line preserves
      dated rent-roll assertions and does not by itself create a canonical
      Space, Party, or LeaseEvent.
    attributes:
      property: {range: Property, inlined: false, required: true}
      as_of_date: {range: date, required: true}
      unit_count: {range: integer, minimum_value: 0}
      occupied_unit_count: {range: integer, minimum_value: 0}
      occupancy_pct: {range: decimal, minimum_value: 0, maximum_value: 100, description: Occupancy in 0–100 percentage points; 95 means 95 percent.}
      total_contract_rent: {range: Money}
      total_market_rent: {range: Money}
      rent_period: {range: RentPeriod}
      lines: {range: RentRollLine, multivalued: true, inlined: true, inlined_as_list: true}

  RentRollLine:
    description: >-
      Supporting rent-roll detail. space resolves to canonical Space. tenant
      is the canonical legal lessee Party when present, and lease resolves to
      canonical LeaseEvent when known. When both tenant and lease are present,
      tenant must match a party with role: lessee declared by that lease, if
      the lease declares any lessee. References remain optional for aggregate,
      vacant, unleased, or unresolved lines; the line does not duplicate
      canonical space identity, tenant names, or lease dates. When a source
      tenant cannot be resolved to a canonical Party, omit tenant and preserve
      the source evidence through the RentRoll provenance and profile-level
      SourceArtifact records; do not mint a placeholder Party or copy the
      source name into extras.
    attributes:
      space: {range: Space, inlined: false}
      tenant: {range: Party, inlined: false, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])"}
      lease: {range: LeaseEvent, inlined: false}
      occupancy_status: {range: CodeableConcept}
      reported_area: {range: Area}
      contract_rent: {range: Money}
      market_rent: {range: Money}
      extras: {range: Any}

  Valuation:
    is_a: Entity
    description: Opinions of value — AVM/appraisal/BPO. Never tax-roll values (those are assessments). Append-only.
    attributes:
      property: {range: Property, inlined: false, required: true}
      property_state: {range: PropertyStateSnapshot, inlined: false}
      kind: {range: ValuationType, required: true}
      valuation_method: {description: desktop | exterior | hybrid | traditional}
      value_type: {description: market_value | liquidation | insurable | land | ... (open)}
      value: {range: Money, required: true}
      value_low: {range: Money}
      value_high: {range: Money}
      value_per_area: {range: UnitRate}
      land_value: {range: Money, description: Cost-approach site value}
      confidence_score: {range: integer, minimum_value: 0, maximum_value: 100, description: Source-defined confidence score; not governed by the _pct percentage-points convention.}
      forecast_standard_deviation: {range: decimal, description: Source-defined AVM forecast standard deviation; not governed by the _pct percentage-points convention.}
      exposure_days: {range: integer}
      indicated_value_sales_comparison: {range: Money}
      indicated_value_cost: {range: Money}
      indicated_value_income: {range: Money}
      value_premise: {description: as_is | as_completed | as_stabilized}
      interest:
        description: >-
          Interest valued for this opinion; independent of Property.estate_type
          and Transfer.interest_conveyed.
      performed_by_party: {range: Party, inlined: false, pattern: "^[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF](?:[\\s\\S]*[^\\u0009-\\u000D\\u0020\\u0085\\u00A0\\u1680\\u2000-\\u200A\\u2028\\u2029\\u202F\\u205F\\u3000\\uFEFF])?(?![\\s\\S])", description: Canonical person or organization that performed the valuation}
      as_of_date: {range: date, required: true}
      report_date: {range: date}
      artifacts: {range: SourceArtifact, multivalued: true, inlined: false}
