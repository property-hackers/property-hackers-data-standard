name: conformance

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - name: Install pinned LinkML toolchain
        run: just venv
      - name: Install locked Node toolchain
        run: npm ci
      - name: Regenerate and validate contracts
        run: just check
      - name: Verify committed generated artifacts
        # --porcelain (not `git diff`) so newly generated untracked files fail too
        run: |
          git status --porcelain
          test -z "$(git status --porcelain)"
